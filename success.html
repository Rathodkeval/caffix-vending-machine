<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAFFIX - Preparing Coffee</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-decor"></div>
  <div class="bg-smoke"></div>

  <div class="kiosk-container">
    <header class="kiosk-header">
      <div class="brand-section">
        <svg class="brand-logo-svg" viewBox="0 0 24 24">
          <path d="M2 21h18v-2H2v2zM20 8h-2V5h2V2h-2v3H4v8c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6v-3h2c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-2 5c0 2.21-1.79 4-4 4h-4c-2.21 0-4-1.79-4-4V7h12v6zm2-3h-2V9h2v1z"/>
        </svg>
        <span class="brand-name">Caffix</span>
      </div>
      <div class="system-status">
        <span class="status-dot"></span>
        <span>Brewer Active</span>
      </div>
    </header>

    <main class="kiosk-main">
      <div class="status-card">
        <!-- Shaking cup visual -->
        <svg class="loading-coffee-cup" viewBox="0 0 24 24">
          <path d="M2 21h18v-2H2v2zM20 8h-2V5h2V2h-2v3H4v8c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6v-3h2c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-2 5c0 2.21-1.79 4-4 4h-4c-2.21 0-4-1.79-4-4V7h12v6zm2-3h-2V9h2v1z"/>
        </svg>

        <h1 class="status-title">Preparing Beverage</h1>
        <h2 id="status-subtitle" class="status-subtitle">Freshly crafting your customized choice</h2>

        <!-- Kiosk active brewing metrics monitors -->
        <div class="brewer-specs-panel">
          <div class="spec-box">
            <span class="spec-label">Extraction Temp</span>
            <span id="spec-temp" class="spec-value">--°C</span>
          </div>
          <div class="spec-box">
            <span class="spec-label">Pump Pressure</span>
            <span id="spec-pressure" class="spec-value">-- Bar</span>
          </div>
          <div class="spec-box">
            <span class="spec-label">Extraction Flow</span>
            <span class="spec-value">1.8 ml/s</span>
          </div>
        </div>

        <!-- Brew Progress animation and status log text -->
        <div class="brewing-anim-container">
          <span id="brewing-step-text" class="brewing-step-text">Heating boiler element...</span>
          
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

        <p class="instructions-collect">
          Please wait while your coffee is prepared on demand.<br>
          Ensure you collect the cup only after the indicator turns complete.
        </p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
