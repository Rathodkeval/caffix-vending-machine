<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CAFFIX - Payment Failed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-decor"></div>

  <div class="kiosk-container">
    <header class="kiosk-header">
      <div class="brand-section">
        <svg class="brand-logo-svg" viewBox="0 0 24 24">
          <path d="M2 21h18v-2H2v2zM20 8h-2V5h2V2h-2v3H4v8c0 3.31 2.69 6 6 6h4c3.31 0 6-2.69 6-6v-3h2c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-2 5c0 2.21-1.79 4-4 4h-4c-2.21 0-4-1.79-4-4V7h12v6zm2-3h-2V9h2v1z"/>
        </svg>
        <span class="brand-name">Caffix</span>
      </div>
      <div class="system-status" style="border-color: rgba(230, 57, 70, 0.2)">
        <span class="status-dot" style="background-color: var(--color-error); box-shadow: 0 0 8px var(--color-error)"></span>
        <span>Payment Alert</span>
      </div>
    </header>

    <main class="kiosk-main">
      <div class="status-card" style="border-color: rgba(230, 57, 70, 0.2)">
        <!-- Error cross icon -->
        <div class="error-icon-wrapper">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>

        <h1 class="status-title" style="color: var(--color-error)">Payment Failed</h1>
        <p class="instructions-collect" style="font-size: 1.1rem; color: var(--color-text-white)">
          Payment could not be completed.<br>
          Please check your internet connection or try scanning again.
        </p>

        <div class="failure-buttons">
          <button id="try-again-btn" class="btn-try-again">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
            <span>Try Again</span>
          </button>
          
          <button id="home-btn" class="btn-home">
            <span>Back to Home</span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
